<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解剖学・生理学 国試対策アプリ</title>
  
  <!-- CSSフレームワーク(Tailwind)と、独自のCSSファイルを読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

  <!-- ヘッダー -->
  <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
    <div class="max-w-3xl mx-auto flex justify-between items-center">
      <h1 class="text-lg font-bold tracking-wider">解剖学・生理学 学習アプリ</h1>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="max-w-3xl mx-auto p-4 sm:p-6 mt-4 bg-white rounded-lg shadow-sm">
    <div class="mb-6">
      <span class="text-sm text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded">第1カテゴリ</span>
      <h2 class="text-2xl font-bold mt-3 border-none p-0" id="category-title">神経組織と興奮の伝導</h2>
      <p class="text-sm text-gray-500 mt-2">※グレーのマーカー部分をタップすると解答が表示されます。</p>
    </div>

    <!-- タブ -->
    <div class="flex border-b mb-6 text-center">
      <button class="w-1/2 py-2 border-b-2 border-blue-600 text-blue-600 font-bold">📖 事前学習</button>
      <button class="w-1/2 py-2 text-gray-400 cursor-not-allowed">✏️ 問題演習 (次回実装)</button>
    </div>

    <!-- 事前学習コンテンツ表示エリア -->
    <div id="lesson-content"></div>
  </main>

  <!-- JavaScript本体を読み込み (type="module"が必須) -->
  <script type="module" src="app.js"></script>
</body>
</html>
