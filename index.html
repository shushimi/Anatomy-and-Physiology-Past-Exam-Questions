<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解剖学・生理学 国試対策アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

  <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
    <div class="max-w-3xl mx-auto flex justify-between items-center">
      <h1 class="text-lg font-bold tracking-wider">解剖学・生理学 学習アプリ</h1>
    </div>
  </header>

  <main class="max-w-3xl mx-auto p-4 sm:p-6 mt-4 bg-white rounded-lg shadow-sm min-h-[500px]">
    <div class="mb-6">
      <span class="text-sm text-blue-600 font-bold bg-blue-50 px-2 py-1 rounded">第1カテゴリ</span>
      <h2 class="text-2xl font-bold mt-3 border-none p-0">神経組織と興奮の伝導</h2>
    </div>

    <!-- タブ切り替えボタン -->
    <div class="flex border-b mb-6 text-center">
      <button id="tab-lesson" class="w-1/2 py-2 border-b-2 border-blue-600 text-blue-600 font-bold">📖 事前学習</button>
      <button id="tab-quiz" class="w-1/2 py-2 border-b-2 border-transparent text-gray-500 font-bold hover:bg-gray-50">✏️ 問題演習</button>
    </div>

    <!-- 📖 事前学習エリア -->
    <div id="lesson-area">
      <p class="text-sm text-gray-500 mb-4">※グレーのマーカー部分をタップすると解答が表示されます。</p>
      <div id="lesson-content"></div>
    </div>

    <!-- ✏️ 問題演習エリア -->
    <div id="quiz-area" class="hidden">
      <!-- 演習スタート画面 -->
      <div id="quiz-start-screen" class="text-center py-10">
        <h3 class="text-xl font-bold mb-6 text-gray-700">出題形式を選んでください</h3>
        <button id="btn-start-normal" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-blue-700 m-2">収録順で開始</button>
        <button id="btn-start-random" class="bg-emerald-600 text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-emerald-700 m-2">ランダムで開始</button>
      </div>

      <!-- クイズプレイ画面 -->
      <div id="quiz-play-screen" class="hidden">
        <div class="flex justify-between text-sm text-gray-500 mb-4 font-bold">
          <span id="quiz-progress">問題 1 / 40</span>
        </div>
        <div id="question-text" class="text-lg font-bold mb-6 leading-relaxed"></div>
        <div id="options-container" class="space-y-3 mb-6"></div>
        <button id="btn-submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow hover:bg-blue-700">解答する</button>
        
        <!-- 正誤結果表示エリア -->
        <div id="result-area" class="hidden mt-6 p-4 rounded-lg">
          <p id="result-text" class="text-2xl font-bold mb-2"></p>
          <p id="correct-answer-text" class="text-sm text-gray-800 mb-4 font-bold"></p>
          <button id="btn-next" class="w-full bg-gray-800 text-white py-3 rounded-lg font-bold shadow hover:bg-gray-900">次の問題へ</button>
        </div>
      </div>
      
      <!-- 演習完了画面 -->
      <div id="quiz-result-screen" class="hidden text-center py-10">
        <h3 id="result-title" class="text-2xl font-bold mb-4">演習完了！</h3>
        <p id="final-score" class="text-lg mb-6 font-bold text-gray-700"></p>
        <button id="btn-retry-mistakes" class="hidden bg-red-500 text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-red-600 m-2">間違えた問題を復習する</button>
        <button id="btn-back-to-start" class="bg-gray-600 text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-gray-700 m-2">最初からやり直す</button>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
